version: '3.8'

services:
  backend:
    build: ./backend
    container_name: camara-placas-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DAHUA_HOST=${DAHUA_HOST:-192.168.38.200}
      - DAHUA_PORT=${DAHUA_PORT:-80}
      - DAHUA_USER=${DAHUA_USER:-admin}
      - DAHUA_PASSWORD=${DAHUA_PASSWORD:-STStec2703}
      - PORT=3001
    restart: unless-stopped
    # Si el contenedor no alcanza la cámara vía WireGuard, descomentar:
    # network_mode: host

  frontend:
    build: ./frontend
    container_name: camara-placas-frontend
    # Dejamos el 8080 en formato localhost o disponible internamente
    # pero el acceso primordial será a través de Caddy en los puertos 80/443
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACME_AGREE=true
    # Redirige todo el tráfico HTTPS del dominio al contenedor de frontend
    command: caddy reverse-proxy --from https://mc47.cr-safe.com --to http://frontend:80
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config:
