version: '3.8'

services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "51820:51820/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Costa_Rica
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
